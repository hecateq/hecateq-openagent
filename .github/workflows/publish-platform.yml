name: publish-platform
run-name: "platform packages ${{ inputs.version }}"

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      dist_tag:
        required: false
        type: string
        default: ""
      publish_upstream:
        description: "Also publish upstream-named packages (oh-my-opencode-*, oh-my-openagent-*)"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 3.0.0-beta.12)"
        required: true
        type: string
      dist_tag:
        description: "npm dist tag (e.g., beta, latest)"
        required: false
        type: string
        default: ""
      publish_upstream:
        description: "Also publish upstream-named packages (oh-my-opencode-*, oh-my-openagent-*)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  # =============================================================================
  # Job 1: Build binaries for all platforms
  # - Windows builds on windows-latest (avoid bun cross-compile segfault)
  # - All other platforms build on ubuntu-latest
  # - Uploads compressed artifacts for the publish job
  # =============================================================================
  build:
    runs-on: ${{ startsWith(matrix.platform, 'windows-') && 'windows-latest' || startsWith(matrix.platform, 'darwin-') && 'macos-latest' || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 11
      matrix:
        platform: [darwin-arm64, darwin-x64, darwin-x64-baseline, linux-x64, linux-x64-baseline, linux-arm64, linux-x64-musl, linux-x64-musl-baseline, linux-arm64-musl, windows-x64, windows-x64-baseline]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/cli @ast-grep/napi"

      - name: Validate release inputs
        id: validate
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          VERSION="${INPUT_VERSION}"
          DIST_TAG="${INPUT_DIST_TAG}"

          # Fallback: resolve version from root package.json when input is empty
          if [ -z "$VERSION" ] && [ -f "package.json" ]; then
            echo "::warning::inputs.version is empty, resolving from root package.json"
            VERSION="$(node -p 'require("./package.json").version')"
            echo "Resolved version: ${VERSION}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi

          if [ -n "$DIST_TAG" ] && ! [[ "$DIST_TAG" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::Invalid dist_tag: $DIST_TAG"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT

      - name: Check if already published
        id: check
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          PLATFORM_KEY="${{ matrix.platform }}"
          PLATFORM_KEY="${PLATFORM_KEY//-/_}"
          
          # Check oh-my-opencode
          OC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/oh-my-opencode-${{ matrix.platform }}/${VERSION}")
          # Check oh-my-openagent
          OA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/oh-my-openagent-${{ matrix.platform }}/${VERSION}")
          # Check @hecateq/hecateq-openagent (scoped package name needs URL encoding for @)
          HC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/@hecateq%2Fhecateq-openagent-${{ matrix.platform }}/${VERSION}")
          
          echo "oh-my-opencode-${{ matrix.platform }}@${VERSION}: ${OC_STATUS}"
          echo "oh-my-openagent-${{ matrix.platform }}@${VERSION}: ${OA_STATUS}"
          echo "@hecateq/hecateq-openagent-${{ matrix.platform }}@${VERSION}: ${HC_STATUS}"
          
          if [ "$OC_STATUS" = "200" ]; then
            echo "skip_opencode=true" >> $GITHUB_OUTPUT
            echo "✓ oh-my-opencode-${{ matrix.platform }}@${VERSION} already published"
          else
            echo "skip_opencode=false" >> $GITHUB_OUTPUT
            echo "→ oh-my-opencode-${{ matrix.platform }}@${VERSION} needs publishing"
          fi
          
          if [ "$OA_STATUS" = "200" ]; then
            echo "skip_openagent=true" >> $GITHUB_OUTPUT
            echo "✓ oh-my-openagent-${{ matrix.platform }}@${VERSION} already published"
          else
            echo "skip_openagent=false" >> $GITHUB_OUTPUT
            echo "→ oh-my-openagent-${{ matrix.platform }}@${VERSION} needs publishing"
          fi
          
          if [ "$HC_STATUS" = "200" ]; then
            echo "skip_hecateq=true" >> $GITHUB_OUTPUT
            echo "✓ @hecateq/hecateq-openagent-${{ matrix.platform }}@${VERSION} already published"
          else
            echo "skip_hecateq=false" >> $GITHUB_OUTPUT
            echo "→ @hecateq/hecateq-openagent-${{ matrix.platform }}@${VERSION} needs publishing"
          fi
          
          # Skip build only if ALL are already published
          if [ "$OC_STATUS" = "200" ] && [ "$OA_STATUS" = "200" ] && [ "$HC_STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version in package.json
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          cd "packages/oh-my-opencode-${{ matrix.platform }}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Set root package version
        if: steps.check.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Pre-download baseline compile target
        if: steps.check.outputs.skip != 'true' && endsWith(matrix.platform, '-baseline')
        shell: bash
        run: |
          BUN_VERSION=$(bun --version)
          PLATFORM="${{ matrix.platform }}"
          PKG_NAME="bun-${PLATFORM}"
          CACHE_DIR=$(bun pm cache)
          CACHE_DEST="${CACHE_DIR}/${PKG_NAME}-v${BUN_VERSION}"
          
          if [[ -f "$CACHE_DEST" ]]; then
            echo "✓ Compile target already cached at ${CACHE_DEST}"
            exit 0
          fi
          
          echo "Pre-downloading ${PKG_NAME} v${BUN_VERSION} to ${CACHE_DEST}"
          TARBALL_URL="https://registry.npmjs.org/@oven/bun-${PLATFORM}/-/bun-${PLATFORM}-${BUN_VERSION}.tgz"
          echo "URL: ${TARBALL_URL}"
          
          mkdir -p "$(dirname "$CACHE_DEST")"
          TMP_DIR=$(mktemp -d)
          
          # Download and extract the bun binary from npm tarball
          curl -fsSL --retry 5 --retry-delay 5 "${TARBALL_URL}" | tar -xzf - -C "${TMP_DIR}"
          
          if [[ "$PLATFORM" == windows-* ]]; then
            BIN_NAME="bun.exe"
          else
            BIN_NAME="bun"
          fi
          
          # npm tarball has package/bin/bun structure
          if [[ -f "${TMP_DIR}/package/bin/${BIN_NAME}" ]]; then
            cp "${TMP_DIR}/package/bin/${BIN_NAME}" "${CACHE_DEST}"
          elif [[ -f "${TMP_DIR}/package/${BIN_NAME}" ]]; then
            cp "${TMP_DIR}/package/${BIN_NAME}" "${CACHE_DEST}"
          else
            echo "Could not find ${BIN_NAME} in tarball, listing contents:"
            find "${TMP_DIR}" -type f
            exit 1
          fi
          
          chmod +x "${CACHE_DEST}" 2>/dev/null || true
          echo "✓ Pre-downloaded to ${CACHE_DEST}"
          ls -lh "${CACHE_DEST}"

      - name: Build binary
        if: steps.check.outputs.skip != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 10
          shell: bash
          command: |
            bun run build:ast-grep-mcp
            PLATFORM="${{ matrix.platform }}"
            PACKAGE_DIR="packages/oh-my-opencode-${PLATFORM}"
            case "$PLATFORM" in
              darwin-arm64) TARGET="bun-darwin-arm64" ;;
              darwin-x64) TARGET="bun-darwin-x64" ;;
              darwin-x64-baseline) TARGET="bun-darwin-x64-baseline" ;;
              linux-x64) TARGET="bun-linux-x64" ;;
              linux-x64-baseline) TARGET="bun-linux-x64-baseline" ;;
              linux-arm64) TARGET="bun-linux-arm64" ;;
              linux-x64-musl) TARGET="bun-linux-x64-musl" ;;
              linux-x64-musl-baseline) TARGET="bun-linux-x64-musl-baseline" ;;
              linux-arm64-musl) TARGET="bun-linux-arm64-musl" ;;
              windows-x64) TARGET="bun-windows-x64" ;;
              windows-x64-baseline) TARGET="bun-windows-x64-baseline" ;;
            esac
            
            if [[ "$PLATFORM" == windows-* ]]; then
              OUTPUT="${PACKAGE_DIR}/bin/oh-my-opencode.exe"
            else
              OUTPUT="${PACKAGE_DIR}/bin/oh-my-opencode"
            fi
            
            bun build src/cli/index.ts --compile --minify --target=$TARGET --outfile=$OUTPUT
            
            echo "Built binary:"
            ls -lh "$OUTPUT"

      - name: Deploy to Hecateq package directory
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          PLATFORM="${{ matrix.platform }}"
          # Hecateq platform packages exist for: linux-x64, linux-x64-baseline, windows-x64, windows-x64-baseline
          case "$PLATFORM" in
            linux-x64|linux-x64-baseline|windows-x64|windows-x64-baseline)
              HECATEQ_DIR="packages/hecateq-openagent-${PLATFORM}"
              if [[ "$PLATFORM" == windows-* ]]; then
                EXT=".exe"
              else
                EXT=""
              fi
              mkdir -p "${HECATEQ_DIR}/bin"
              cp "packages/oh-my-opencode-${PLATFORM}/bin/oh-my-opencode${EXT}" "${HECATEQ_DIR}/bin/oh-my-opencode${EXT}"
              echo "✓ Deployed to ${HECATEQ_DIR}/bin/"
              ls -lh "${HECATEQ_DIR}/bin/"
              ;;
            *)
              echo "No Hecateq package for ${PLATFORM}, skipping"
              ;;
          esac

      - name: Ad-hoc sign darwin binary
        if: steps.check.outputs.skip != 'true' && startsWith(matrix.platform, 'darwin-')
        run: |
          BINARY="packages/oh-my-opencode-${{ matrix.platform }}/bin/oh-my-opencode"
          echo "Initial state:"
          codesign -dvvv "$BINARY" 2>&1 || true
          echo "Removing any existing signature:"
          codesign --remove-signature "$BINARY" 2>&1 || true
          echo "Applying ad-hoc signature:"
          codesign --sign - --force --timestamp=none "$BINARY"
          echo "Final state:"
          codesign -dvvv "$BINARY" 2>&1
          codesign --verify --verbose "$BINARY"

      - name: Compress binary
        if: steps.check.outputs.skip != 'true'
        run: |
          PLATFORM="${{ matrix.platform }}"
          PACKAGE_DIR="packages/oh-my-opencode-${PLATFORM}"
          cd "$PACKAGE_DIR"
          
          if [[ "$PLATFORM" == windows-* ]]; then
            # Windows: use 7z (pre-installed on windows-latest)
            7z a -tzip ../../binary-${PLATFORM}.zip bin/ package.json
          else
            # Unix: use tar.gz
            tar -czvf ../../binary-${PLATFORM}.tar.gz bin/ package.json
          fi
          
          cd ../..
          echo "Compressed artifact:"
          ls -lh binary-${PLATFORM}.*

      - name: Compress Hecateq package
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          PLATFORM="${{ matrix.platform }}"
          case "$PLATFORM" in
            linux-x64|linux-x64-baseline|windows-x64|windows-x64-baseline)
              HECATEQ_DIR="packages/hecateq-openagent-${PLATFORM}"
              cd "${HECATEQ_DIR}"
              if [[ "$PLATFORM" == windows-* ]]; then
                7z a -tzip "../../binary-hecateq-${PLATFORM}.zip" bin/ package.json
                echo "Compressed Hecateq artifact (zip):"
                ls -lh "../../binary-hecateq-${PLATFORM}.zip"
              else
                tar -czvf "../../binary-hecateq-${PLATFORM}.tar.gz" bin/ package.json
                echo "Compressed Hecateq artifact (tar.gz):"
                ls -lh "../../binary-hecateq-${PLATFORM}.tar.gz"
              fi
              cd ../..
              ;;
            *)
              echo "No Hecateq package for ${PLATFORM}, skipping compress"
              ;;
          esac

      - name: Upload artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            binary-${{ matrix.platform }}.tar.gz
            binary-${{ matrix.platform }}.zip
          retention-days: 1
          if-no-files-found: error

      - name: Upload Hecateq artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: binary-hecateq-${{ matrix.platform }}
          path: |
            binary-hecateq-${{ matrix.platform }}.tar.gz
            binary-hecateq-${{ matrix.platform }}.zip
          retention-days: 1
          if-no-files-found: ignore

  publish:
    needs: build
    if: always() && !cancelled() && inputs.publish_upstream == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        platform: [darwin-arm64, darwin-x64, darwin-x64-baseline, linux-x64, linux-x64-baseline, linux-arm64, linux-x64-musl, linux-x64-musl-baseline, linux-arm64-musl, windows-x64, windows-x64-baseline]
    steps:
      - uses: actions/checkout@v4

      - name: Validate release inputs
        id: validate
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          VERSION="${INPUT_VERSION}"
          DIST_TAG="${INPUT_DIST_TAG}"

          # Fallback: resolve version from root package.json when input is empty
          if [ -z "$VERSION" ] && [ -f "package.json" ]; then
            echo "::warning::inputs.version is empty, resolving from root package.json"
            VERSION="$(node -p 'require("./package.json").version')"
            echo "Resolved version: ${VERSION}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi

          if [ -n "$DIST_TAG" ] && ! [[ "$DIST_TAG" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::Invalid dist_tag: $DIST_TAG"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT

      - name: Check if already published
        id: check
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          OC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/oh-my-opencode-${{ matrix.platform }}/${VERSION}")
          OA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/oh-my-openagent-${{ matrix.platform }}/${VERSION}")
          
          if [ "$OC_STATUS" = "200" ]; then
            echo "skip_opencode=true" >> $GITHUB_OUTPUT
            echo "✓ oh-my-opencode-${{ matrix.platform }}@${VERSION} already published"
          else
            echo "skip_opencode=false" >> $GITHUB_OUTPUT
          fi
          
          if [ "$OA_STATUS" = "200" ]; then
            echo "skip_openagent=true" >> $GITHUB_OUTPUT
            echo "✓ oh-my-openagent-${{ matrix.platform }}@${VERSION} already published"
          else
            echo "skip_openagent=false" >> $GITHUB_OUTPUT
          fi
          
          # Need artifact if either package needs publishing
          if [ "$OC_STATUS" = "200" ] && [ "$OA_STATUS" = "200" ]; then
            echo "skip_all=true" >> $GITHUB_OUTPUT
          else
            echo "skip_all=false" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        id: download
        if: steps.check.outputs.skip_all != 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: .

      - name: Extract artifact
        if: steps.check.outputs.skip_all != 'true' && steps.download.outcome == 'success'
        run: |
          PLATFORM="${{ matrix.platform }}"
          PACKAGE_DIR="packages/oh-my-opencode-${PLATFORM}"
          mkdir -p "$PACKAGE_DIR"
          
          if [[ "$PLATFORM" == windows-* ]]; then
            unzip binary-${PLATFORM}.zip -d "$PACKAGE_DIR/"
          else
            tar -xzvf binary-${PLATFORM}.tar.gz -C "$PACKAGE_DIR/"
          fi
          
          echo "Extracted contents:"
          ls -la "$PACKAGE_DIR/"
          ls -la "$PACKAGE_DIR/bin/"

      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip_all != 'true' && steps.download.outcome == 'success'
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing (>=11.5.1)
        if: steps.check.outputs.skip_all != 'true' && steps.download.outcome == 'success'
        run: npm install -g npm@latest

      - name: Strip token auth from .npmrc to force OIDC
        if: steps.check.outputs.skip_all != 'true' && steps.download.outcome == 'success'
        run: |
          for f in .npmrc "$HOME/.npmrc"; do
            if [ -f "$f" ]; then
              sed -i.bak '/_authToken/d' "$f"
              rm -f "$f.bak"
              echo "Cleaned $f"
            fi
          done

      - name: Publish oh-my-opencode-${{ matrix.platform }}
        if: steps.check.outputs.skip_opencode != 'true' && steps.download.outcome == 'success'
        env:
          DIST_TAG: ${{ steps.validate.outputs.dist_tag }}
        run: |
          cd "packages/oh-my-opencode-${{ matrix.platform }}"

          if [ -n "$DIST_TAG" ]; then
            npm publish --access public --tag "$DIST_TAG" --loglevel verbose
          else
            npm publish --access public --loglevel verbose
          fi
        timeout-minutes: 15

      - name: Publish oh-my-openagent-${{ matrix.platform }}
        if: steps.check.outputs.skip_openagent != 'true' && steps.download.outcome == 'success'
        env:
          DIST_TAG: ${{ steps.validate.outputs.dist_tag }}
        run: |
          cd "packages/oh-my-opencode-${{ matrix.platform }}"

          # Rename package for oh-my-openagent
          jq --arg name "oh-my-openagent-${{ matrix.platform }}" \
             --arg desc "Platform-specific binary for oh-my-openagent (${{ matrix.platform }})" \
             '.name = $name | .description = $desc | .bin = {"oh-my-openagent": (.bin | to_entries | .[0].value)}' \
             package.json > tmp.json && mv tmp.json package.json

          if [ -n "$DIST_TAG" ]; then
            npm publish --access public --tag "$DIST_TAG" --loglevel verbose
          else
            npm publish --access public --loglevel verbose
          fi
        timeout-minutes: 15

  # =============================================================================
  # Job 3: Publish Hecateq-scoped platform packages (@hecateq/hecateq-openagent-*)
  # - For linux-x64, linux-x64-baseline, windows-x64, windows-x64-baseline
  # - Uses the Hecateq-specific package directories (already have correct name in package.json)
  # =============================================================================
  publish-hecateq:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        platform: [linux-x64, linux-x64-baseline, windows-x64, windows-x64-baseline]
    steps:
      - uses: actions/checkout@v4

      - name: Validate release inputs
        id: validate
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          VERSION="${INPUT_VERSION}"
          DIST_TAG="${INPUT_DIST_TAG}"

          # Fallback: resolve version from root package.json when input is empty
          if [ -z "$VERSION" ] && [ -f "package.json" ]; then
            echo "::warning::inputs.version is empty, resolving from root package.json"
            VERSION="$(node -p 'require("./package.json").version')"
            echo "Resolved version: ${VERSION}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi

          if [ -n "$DIST_TAG" ] && ! [[ "$DIST_TAG" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::Invalid dist_tag: $DIST_TAG"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT

      - name: Check if already published
        id: check
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          # npm registry API uses @scope%2Fname format for scoped packages
          HC_NAME="@hecateq/hecateq-openagent-${{ matrix.platform }}"
          HC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/@hecateq%2Fhecateq-openagent-${{ matrix.platform }}/${VERSION}")

          if [ "$HC_STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ ${HC_NAME}@${VERSION} already published"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "→ ${HC_NAME}@${VERSION} needs publishing"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Download Hecateq artifact
        id: download
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: binary-hecateq-${{ matrix.platform }}
          path: .

      - name: Extract artifact
        id: extract
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success'
        run: |
          PLATFORM="${{ matrix.platform }}"
          HECATEQ_DIR="packages/hecateq-openagent-${PLATFORM}"

          if [[ "$PLATFORM" == windows-* ]]; then
            unzip -o "binary-hecateq-${PLATFORM}.zip" -d "${HECATEQ_DIR}/"
          else
            tar -xzvf "binary-hecateq-${PLATFORM}.tar.gz" -C "${HECATEQ_DIR}/"
          fi

          echo "Extracted Hecateq package contents:"
          ls -la "${HECATEQ_DIR}/"
          ls -la "${HECATEQ_DIR}/bin/"

          # Validate that the platform binary exists after extraction.
          # The binary is not tracked in git (see .gitignore) — it must be built by
          # the 'build' job and shipped inside the artifact. If missing, the
          # publish would ship a broken tarball (only .gitkeep).
          if [[ "$PLATFORM" == windows-* ]]; then
            BINARY="${HECATEQ_DIR}/bin/oh-my-opencode.exe"
          else
            BINARY="${HECATEQ_DIR}/bin/oh-my-opencode"
          fi

          if [ ! -f "$BINARY" ]; then
            echo "::error::Platform binary not found after artifact extraction: $BINARY"
            echo "::error::The build job must compile the binary before the Hecateq package can be published."
            exit 1
          fi

          echo "✓ Platform binary verified: $BINARY"
          ls -lh "$BINARY"

      - name: Update version in Hecateq package.json
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success' && steps.extract.outcome == 'success'
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          HECATEQ_DIR="packages/hecateq-openagent-${{ matrix.platform }}"
          jq --arg v "$VERSION" '.version = $v' "${HECATEQ_DIR}/package.json" > tmp.json && mv tmp.json "${HECATEQ_DIR}/package.json"
          echo "Updated ${HECATEQ_DIR}/package.json version to ${VERSION}"

      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success' && steps.extract.outcome == 'success'
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing (>=11.5.1)
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success' && steps.extract.outcome == 'success'
        run: npm install -g npm@latest

      - name: Strip token auth from .npmrc to force OIDC
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success' && steps.extract.outcome == 'success'
        run: |
          for f in .npmrc "$HOME/.npmrc"; do
            if [ -f "$f" ]; then
              sed -i.bak '/_authToken/d' "$f"
              rm -f "$f.bak"
              echo "Cleaned $f"
            fi
          done

      - name: Publish @hecateq/hecateq-openagent-${{ matrix.platform }}
        if: steps.check.outputs.skip != 'true' && steps.download.outcome == 'success' && steps.extract.outcome == 'success'
        env:
          DIST_TAG: ${{ steps.validate.outputs.dist_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd "packages/hecateq-openagent-${{ matrix.platform }}"

          if [ -n "$DIST_TAG" ]; then
            npm publish --access public --tag "$DIST_TAG" --loglevel verbose
          else
            npm publish --access public --loglevel verbose
          fi
        timeout-minutes: 15
