name: Publish npm beta

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  # Extract version from package.json for downstream jobs
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get_version
        run: |
          VERSION="$(jq -r '.version // empty' package.json)"
          if [ -z "$VERSION" ]; then
            echo "::error::version job output is empty — package.json has no 'version' field"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$'; then
            echo "::error::Invalid semver in package.json version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # Build and publish platform packages (including Hecateq Windows x64/x64-baseline)
  # This runs before the main package so optionalDependencies exist on npm registry
  platform-packages:
    needs: [version]
    uses: ./.github/workflows/publish-platform.yml
    with:
      version: ${{ needs.version.outputs.version }}
      dist_tag: beta
    secrets: inherit

  # Build and publish the main @hecateq/hecateq-openagent package
  publish:
    needs: [platform-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_ALLOW_SCRIPTS: "@ast-grep/cli @ast-grep/napi"

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Dry-run packaging
        run: npm pack --dry-run

      - name: Publish to npm (beta)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag beta
